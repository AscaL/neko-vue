name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Opt in to Node.js 24 for JS-based actions until it becomes the default (see GitHub changelog).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
          run-install: true

      # Playground deps live only under playground/ (vue-router, @vitejs/plugin-vue).
      - name: Install playground dependencies
        run: npm install --prefix playground --no-audit --no-fund

      # Use `vp run check` so we never invoke bare `vp check` (which typechecks playground
      # against root node_modules and fails). Scripts match package.json `check` / `check:playground`.
      - name: Lint, format, and typecheck (library + playground)
        run: vp run check && vp run check:playground

      - name: Unit tests
        run: vp test

      - name: Library pack (publish layout)
        run: vp pack
