name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: lts
          cache: true
          run-install: true

      - name: Lint, format, and typecheck
        run: vp check

      - name: Unit tests
        run: vp test

      - name: Library pack (publish layout)
        run: vp pack
